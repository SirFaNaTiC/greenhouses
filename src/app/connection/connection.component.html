<div class="login-container">
    <form>
        <label>Email :</label>
        <input type="email" [(ngModel)]="email" name="nom" placeholder="example@gmail.com">
        <br>
        <label>Password :</label>
        <input type="text" [(ngModel)]="password" name="email">
        <br>
        <button type="submit" (click)="verifyuser(email, password)" routerLink="" >se connecter</button>
    </form>
    <button routerLink="">Page d'accueil</button>
</div>
